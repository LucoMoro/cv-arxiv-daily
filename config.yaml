# TODO: add papers by configuration file
base_url: "https://arxiv.paperswithcode.com/api/v0/papers/"
user_name: "LucoMoro"
repo_name: "cv-arxiv-daily"
show_authors: True
show_links: True
show_badge: True
max_results: 20

publish_readme: True
publish_gitpage: True
publish_wechat: False

# file paths
json_readme_path: './docs/cv-arxiv-daily.json'
json_gitpage_path: './docs/cv-arxiv-daily-web.json'
json_wechat_path: './docs/cv-arxiv-daily-wechat.json'

md_readme_path: 'README.md'
md_gitpage_path: './docs/index.md'
md_wechat_path: './docs/wechat.md'

# keywords to search
keywords:
    "Adversarial Attack":
        query: 'all:"adversarial attack" OR all:"adversarial attacks" OR all:"adversarial example" OR all:"adversarial examples"'
    "Jailbreak":
        query: 'all:"jailbreak" OR all:"jailbreaks" OR all:"jailbreaking" OR all:"LLM jailbreak" OR all:"model jailbreak" OR all:"prompt jailbreak"'
    "Prompt Injection":
        query: 'all:"prompt injection" OR all:"prompt injections" OR all:"indirect prompt injection" OR all:"direct prompt injection" OR all:"prompt attack"'
    "Prompt Engineering":
        query: 'all:"prompt engineering" OR all:"prompt design" OR all:"prompt optimization" OR all:"prompt tuning" OR all:"instruction design"'
    "Guardrail":
        query: 'all:"guardrail" OR all:"guardrails" OR all:"AI guardrails" OR all:"model guardrail" OR all:"safety guardrail" OR all:"content filter"'
    "Red Teaming":
        query: 'all:"red teaming" OR all:"red-team" OR all:"red teaming evaluation" OR all:"AI red teaming" OR all:"model red teaming"'